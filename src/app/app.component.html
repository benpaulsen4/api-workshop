@if (loading()) {
  loading...
} @else {
  <nav>
    <app-entity-panel
      entityName="schema"
      [items]="items"
      (itemClick)="onSelect($event)"
      (create)="onCreate($event)"
      (delete)="onDelete($event)"
    ></app-entity-panel>
  </nav>

  <div class="h-divider"></div>

  <router-outlet></router-outlet>
}

<p-toast position="top-right" life="5000"></p-toast>
